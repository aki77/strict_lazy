plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "gemfiles/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

# Specs are inherently long and example-heavy.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Metrics/MethodLength:
  Max: 20

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/NestedGroups:
  Max: 4

# Specs intentionally call the public StrictLazy API by name.
RSpec/DescribedClass:
  Enabled: false

# Some resolvers in specs intentionally fulfill nothing (default-path tests).
Lint/EmptyBlock:
  Exclude:
    - "spec/**/*"

# The facade ivar is an internal reserved name, deliberately distinct from @lazy.
Naming/MemoizedInstanceVariableName:
  Enabled: false

Naming/MethodParameterName:
  AllowedNames:
    - n
    - r
    - p
